<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Empleados</title>
</head>
<body>
<h1>Empleados</h1>
<form id="formEmpleado">
    Nombre: <input type="text" id="nombre"><br>
    Apellido: <input type="text" id="apellido"><br>
    RUT/DNI: <input type="text" id="rut"><br>
    Cargo: <input type="text" id="cargo"><br>
    Salario: <input type="number" id="salario"><br>
    <button type="submit">Agregar</button>
</form>

<h2>Lista</h2>
<ul id="listaEmpleados"></ul>

<script src="js/app.js"></script>

<div id="errores"></div>
</body>
</html>
